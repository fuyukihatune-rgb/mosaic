<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Mosaic</title>
  <meta name="description" content="DIDシステム向けのプライベートメモアプリ" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mosaic" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f9f9f9;
      --surface: #ffffff;
      --border: #e8e8e8;
      --border-light: #f2f2f2;
      --text: #1a1a1a;
      --text-2: #555;
      --text-3: #888;
      --text-4: #bbb;
      --text-5: #ddd;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, "Helvetica Neue", "Noto Sans JP", sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; touch-action: pan-x pan-y; }
    #app { height: 100%; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Nav ── */
    .nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 16px; padding-top: var(--safe-top);
      display: flex; align-items: center; gap: 4px;
      height: calc(50px + var(--safe-top));
      position: sticky; top: 0; z-index: 100; flex-shrink: 0;
    }
    .nav-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; margin-right: 6px; white-space: nowrap; flex-shrink: 0; }
    .nav-tabs { display: flex; overflow-x: auto; scrollbar-width: none; flex: 1; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 0 12px; height: 50px; cursor: pointer; font-size: 13px; font-weight: 400; color: var(--text-3); white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
    .nav-tab.active { border-bottom-color: var(--text); color: var(--text); font-weight: 600; }
    .nav-icon-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-3); padding: 6px; flex-shrink: 0; margin-left: auto; }

    /* ── Install banner ── */
    .install-banner {
      background: var(--text); color: #fff;
      padding: 10px 16px; display: flex; align-items: center; gap: 10px;
      font-size: 13px; flex-shrink: 0;
    }
    .install-banner.hidden { display: none; }
    .install-banner-text { flex: 1; line-height: 1.4; }
    .install-banner-text strong { display: block; font-size: 13px; }
    .install-banner-text span { font-size: 11px; color: #aaa; }
    .install-btn { background: #fff; color: var(--text); border: none; border-radius: 4px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .install-close { background: none; border: none; color: #aaa; cursor: pointer; font-size: 18px; padding: 0 4px; }

    /* ── Main scroll ── */
    .main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .content { max-width: 680px; margin: 0 auto; padding: 16px 14px; padding-bottom: calc(24px + var(--safe-bottom)); }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
    .card.accent { border-left-width: 3px; }

    /* ── Setup ── */
    .setup-root { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .setup-inner { width: 100%; max-width: 400px; }
    .setup-header { text-align: center; margin-bottom: 32px; }
    .setup-logo { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; color: var(--text); margin-bottom: 6px; }
    .setup-tagline { font-size: 13px; color: var(--text-3); }
    .step-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .step-dot { width: 28px; height: 4px; border-radius: 2px; background: var(--text-5); transition: background 0.2s; }
    .step-dot.active { background: var(--text); }
    .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px; }
    .setup-note { text-align: center; margin-top: 14px; font-size: 11px; color: var(--text-4); }

    /* ── Form elements ── */
    .field-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .field-desc { font-size: 13px; color: var(--text-3); line-height: 1.65; margin-bottom: 16px; }
    input[type="text"], textarea, select {
      width: 100%; border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 12px; font-size: 16px; color: var(--text);
      background: #fafafa; outline: none; font-family: inherit;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, textarea:focus { border-color: #aaa; background: #fff; }
    textarea { resize: vertical; line-height: 1.65; }
    .input-stack { display: flex; flex-direction: column; gap: 10px; }
    .color-label { font-size: 12px; color: var(--text-3); margin-bottom: 8px; margin-top: 14px; }
    .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-dot {
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: border-color 0.1s; flex-shrink: 0;
    }
    .color-dot.selected { border-color: var(--text); }

    /* ── Buttons ── */
    .btn-primary { background: var(--text); color: #fff; border: none; border-radius: 6px; padding: 11px 18px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; transition: opacity 0.15s; }
    .btn-primary:disabled { background: var(--text-5); cursor: default; }
    .btn-secondary { background: #eee; color: var(--text-2); border: none; border-radius: 6px; padding: 11px 16px; font-size: 13px; cursor: pointer; }
    .btn-ghost { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 6px 12px; font-size: 12px; color: var(--text-3); cursor: pointer; }
    .btn-danger { background: none; border: 1px solid #fcc; border-radius: 6px; padding: 11px; font-size: 13px; color: #c00; cursor: pointer; width: 100%; }
    .btn-row { display: flex; gap: 10px; margin-top: 18px; }
    .btn-row .btn-primary { flex: 1; }

    /* ── Pill filters ── */
    .pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      border: 1.5px solid var(--border); border-radius: 20px;
      padding: 4px 12px; font-size: 12px; color: var(--text-3);
      background: var(--surface); cursor: pointer; transition: all 0.1s;
      white-space: nowrap;
    }
    .pill.active { font-weight: 600; }
    .pill-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Compose ── */
    .compose-card { margin-bottom: 14px; }
    .alter-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .compose-row { display: flex; gap: 12px; align-items: flex-start; }
    .compose-textarea {
      flex: 1; border: none; outline: none; resize: none;
      font-size: 16px; line-height: 1.65; background: none;
      min-height: 72px; color: var(--text); font-family: inherit;
    }
    .compose-footer { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-light); flex-wrap: wrap; }
    .mood-select { border: 1px solid var(--border); border-radius: 4px; padding: 5px 8px; font-size: 16px; color: var(--text-2); background: #fafafa; cursor: pointer; }
    .post-btn { margin-left: auto; background: var(--text); color: #fff; border: none; border-radius: 4px; padding: 7px 18px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .post-btn:disabled { background: var(--text-5); cursor: default; }

    /* ── Avatar ── */
    .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; flex-shrink: 0; user-select: none; }

    /* ── Post card ── */
    .post-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .post-meta { flex: 1; min-width: 0; }
    .post-meta-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .alter-name { font-size: 13px; font-weight: 600; }
    .alter-handle { font-size: 12px; color: var(--text-4); }
    .post-time { font-size: 11px; color: var(--text-4); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .post-body { font-size: 14px; line-height: 1.7; color: #222; white-space: pre-wrap; word-break: break-word; }
    .post-footer { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-light); }
    .mood-badge { font-size: 11px; color: var(--text-3); }
    .post-actions { margin-left: auto; display: flex; gap: 10px; }
    .action-btn { background: none; border: none; font-size: 11px; color: var(--text-4); cursor: pointer; padding: 0; }

    /* ── Edit mode ── */
    .edit-area { margin-top: 4px; }
    .edit-textarea { width: 100%; border: 1px solid var(--border); border-radius: 4px; padding: 8px; font-size: 16px; line-height: 1.65; color: var(--text); resize: vertical; outline: none; font-family: inherit; min-height: 72px; }
    .edit-btns { display: flex; gap: 8px; margin-top: 8px; }
    .edit-save { background: var(--text); color: #fff; border: none; border-radius: 4px; padding: 6px 14px; font-size: 12px; cursor: pointer; }
    .edit-cancel { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 6px 14px; font-size: 12px; color: var(--text-3); cursor: pointer; }

    /* ── Alters ── */
    .alter-card-row { display: flex; align-items: center; gap: 14px; }
    .alter-info { flex: 1; min-width: 0; }
    .alter-card-name { font-size: 14px; font-weight: 600; }
    .alter-card-handle { font-size: 12px; color: var(--text-4); margin-top: 1px; }
    .alter-card-role { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .alter-card-count { font-size: 11px; color: var(--text-4); margin-top: 3px; }
    .alter-card-btns { display: flex; flex-direction: column; gap: 6px; }

    /* ── Stats ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .stat-label { font-size: 11px; color: var(--text-3); margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; }
    .bar-row { margin-bottom: 12px; }
    .bar-label { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .bar-name { font-size: 13px; color: #333; flex: 1; }
    .bar-count { font-size: 12px; color: var(--text-3); margin-bottom: 4px; }
    .bar-track { height: 5px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

    /* ── Settings ── */
    .settings-section { margin-bottom: 12px; }
    .settings-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    .settings-desc { font-size: 13px; color: var(--text-3); line-height: 1.65; margin-bottom: 12px; }
    .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-top: 1px solid var(--border-light); font-size: 13px; }
    .stat-row-label { color: var(--text-3); }
    .stat-row-val { font-weight: 600; }

    /* ── Install section in settings ── */
    .install-section { background: var(--text); color: #fff; border-radius: 8px; padding: 18px; margin-bottom: 12px; }
    .install-section-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .install-section-desc { font-size: 13px; color: #aaa; line-height: 1.6; margin-bottom: 14px; }
    .install-steps { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .install-step { display: flex; gap: 10px; align-items: flex-start; }
    .install-step-num { width: 20px; height: 20px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
    .install-step-text { font-size: 13px; color: #ccc; line-height: 1.5; }
    .install-step-text strong { color: #fff; }
    .install-big-btn { background: #fff; color: var(--text); border: none; border-radius: 6px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
    .install-or { text-align: center; font-size: 12px; color: #555; margin: 10px 0; }

    /* ── Section header row ── */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .section-title { font-size: 15px; font-weight: 600; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 48px 0; color: var(--text-4); font-size: 14px; }

    /* ── Saved toast ── */
    .toast { position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; }

    /* ── Terms / Privacy ── */
    .terms-root { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .terms-inner { width: 100%; max-width: 440px; }
    .terms-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px; }
    .terms-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .terms-sub { font-size: 13px; color: var(--text-3); margin-bottom: 18px; }
    .terms-scroll { max-height: 46vh; overflow-y: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--border-light); border-radius: 8px; padding: 14px; background: #fafafa; }
    .terms-h { font-size: 14px; font-weight: 700; margin: 14px 0 6px; }
    .terms-h:first-child { margin-top: 0; }
    .terms-p { font-size: 13px; line-height: 1.8; color: var(--text-2); }
    .terms-list { font-size: 13px; line-height: 1.8; color: var(--text-2); padding-left: 18px; }

    /* ── Mention ── */
    .mention-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .mention-bar-label { font-size: 11px; color: var(--text-4); margin-right: 2px; }
    .mention-chip { border: 1px solid var(--border); background: #fafafa; border-radius: 16px; padding: 3px 10px; font-size: 12px; color: var(--text-2); cursor: pointer; white-space: nowrap; }
    .mention-chip:active { background: #eee; }
    .mention { font-weight: 600; border-radius: 4px; padding: 0 3px; }
    .mention-all { color: #c0704a; background: #c0704a18; }
    .announce-badge { font-size: 11px; font-weight: 600; color: #c0704a; background: #c0704a14; border-radius: 4px; padding: 2px 7px; }

    /* ── Developer / Donation ── */
    .dev-msg { font-size: 13px; color: var(--text-2); line-height: 1.7; margin-bottom: 12px; }
    .dev-links { display: flex; flex-direction: column; gap: 8px; }
    .dev-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text); text-decoration: none; border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; }
    .eth-box { background: #fafafa; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 12px; font-family: ui-monospace, "SF Mono", Menlo, monospace; word-break: break-all; line-height: 1.6; color: var(--text-2); margin-bottom: 10px; }
    .donate-block { margin-bottom: 16px; }
    .donate-block:last-of-type { margin-bottom: 0; }
    .donate-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

    /* ── Search ── */
    .search-bar { position: relative; margin-bottom: 10px; }
    .search-input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 34px 10px 36px; font-size: 16px; background: var(--surface); color: var(--text); outline: none; }
    .search-input:focus { border-color: #aaa; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-4); pointer-events: none; }
    .search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-3); font-size: 18px; cursor: pointer; padding: 2px 6px; line-height: 1; }
    .search-count { font-size: 12px; color: var(--text-3); margin-bottom: 8px; }

    /* ── Calendar ── */
    .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-title { font-size: 15px; font-weight: 700; }
    .cal-nav { background: none; border: 1px solid var(--border); border-radius: 6px; width: 34px; height: 34px; font-size: 15px; color: var(--text-2); cursor: pointer; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { text-align: center; font-size: 11px; color: var(--text-3); padding: 4px 0; }
    .cal-dow.sun { color: #c0704a; }
    .cal-dow.sat { color: #4f7cac; }
    .cal-cell { aspect-ratio: 1 / 1; border: 1px solid var(--border-light); border-radius: 8px; background: var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 4px 2px; cursor: pointer; position: relative; transition: border-color 0.1s; }
    .cal-cell.empty { border: none; background: none; cursor: default; }
    .cal-cell.has-posts { border-color: var(--border); }
    .cal-cell.today { border-color: var(--text); }
    .cal-cell.selected { border-color: var(--text); background: #1a1a1a0a; border-width: 2px; }
    .cal-daynum { font-size: 12px; color: var(--text-2); }
    .cal-cell.today .cal-daynum { font-weight: 700; color: var(--text); }
    .cal-dots { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 3px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
    .cal-more { font-size: 9px; color: var(--text-4); }
    .cal-selected-head { font-size: 14px; font-weight: 600; margin: 18px 0 10px; }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stat-value { font-size: 18px; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const PALETTE = ["#4f7cac","#7a6a9a","#c97b5a","#4a9a7a","#c0704a","#6a7a9a","#9a7a4a","#7a4a6a","#4a7a9a","#9a4a4a"];
const MOODS = [
  { value:"happy",   emoji:"😊", label:"嬉しい" },
  { value:"neutral", emoji:"😐", label:"ふつう" },
  { value:"tired",   emoji:"😴", label:"疲れた" },
  { value:"sad",     emoji:"😔", label:"つらい" },
  { value:"anxious", emoji:"😰", label:"不安" },
  { value:"angry",   emoji:"😤", label:"怒り" },
  { value:"safe",    emoji:"🛡️", label:"安心" },
  { value:"numb",    emoji:"🌫️", label:"感覚なし" },
];
const STORAGE_KEY = "mosaic_v1";

// ── 開発者情報・寄付設定 ──────────────────────────────────────────────────────
// ↓↓↓ ここを自分の情報に書き換えてください ↓↓↓
const DEV_INFO = {
  name: "田中志（たなかしるす）",
  message: "このアプリは個人が作っています。やさしい気持ちで使ってもらえたら嬉しいです。",
  links: [
    { label: "X（Twitter）", url: "https://x.com/Sirusu_Tanaka" },
  ],
};
// 寄付を受け取るアドレス。address が空のものは画面に表示されません。
const DONATIONS = [
  { key: "btc", label: "ビットコイン（BTC）", address: "1EHshWSHyvJFjkAYQ5rPX7nKo2FRKWF58f" },
  { key: "eth", label: "イーサリアム（ETH）", address: "0xb7da6af09c0f8db95d0c0e352e32d1915483931e" },
];
// ↑↑↑ ここまで ↑↑↑
function activeDonations() {
  return DONATIONS.filter(d => d.address && d.address.trim());
}

// 規約・プライバシーの内容を変えたら数字を1つ増やすと、もう一度同意画面が出ます
const TERMS_VERSION = 1;
// 全体メンション（周知）に使える言葉
const ALL_MENTION_WORDS = ["全体", "みんな", "ぜんいん"];

// ── アプリのバージョン ────────────────────────────────────────────────────────
// 更新するたびに数字を上げる。sw.js の CACHE_NAME も合わせて変えること。
const APP_VERSION = "1.2.0";
const VERSION_KEY = "mosaic_version";
// 今回のバージョンで新しくなったところ（アップデート画面に出ます）
const WHATS_NEW = [
  "「アルター」の表記を「人格」に変えました",
  "投稿や人格名で探せる検索を追加しました",
  "カレンダーから、その日の投稿を見られるようにしました",
  "他の人格や全体へ「メンション・周知」できるようにしました",
  "開発者情報と、寄付（BTC・ETH）の画面を追加しました",
];

// ── State ────────────────────────────────────────────────────────────────────
let state = {
  initialized: false,
  systemName: "",
  alters: [],
  posts: [],
  agreedTermsVersion: 0,
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    s.posts = (s.posts||[]).map(p => ({...p, timestamp: new Date(p.timestamp)}));
    state = { ...state, ...s };
  } catch {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function randomId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function timeAgo(date) {
  const d = Math.floor((Date.now() - new Date(date).getTime()) / 1000);
  if (d < 60) return `${d}秒前`;
  if (d < 3600) return `${Math.floor(d/60)}分前`;
  if (d < 86400) return `${Math.floor(d/3600)}時間前`;
  return `${Math.floor(d/86400)}日前`;
}

function formatDate(date) {
  const d = new Date(date);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Avatar HTML ──────────────────────────────────────────────────────────────
function avatarHTML(alter, size=36) {
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${alter.color};font-size:${Math.round(size*0.38)}px">${alter.name.slice(0,1)}</div>`;
}

// ── PWA Install ──────────────────────────────────────────────────────────────
let deferredPrompt = null;
let installBannerDismissed = localStorage.getItem('mosaic_install_dismissed') === '1';

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (!installBannerDismissed) showInstallBanner();
});

function showInstallBanner() {
  const banner = document.getElementById('install-banner');
  if (banner) banner.classList.remove('hidden');
}

function hideInstallBanner() {
  const banner = document.getElementById('install-banner');
  if (banner) banner.classList.add('hidden');
  installBannerDismissed = true;
  localStorage.setItem('mosaic_install_dismissed', '1');
}

async function triggerInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    hideInstallBanner();
  }
}

// ── Detect iOS for install instructions ─────────────────────────────────────
function isIOS() { return /iphone|ipad|ipod/i.test(navigator.userAgent); }
function isInStandaloneMode() { return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone; }

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  // 初回起動：まだ規約に同意していなければ規約画面を出す
  if ((state.agreedTermsVersion || 0) < TERMS_VERSION) {
    app.innerHTML = renderTerms(false);
    return;
  }
  // 設定からあとで読み返すとき
  if (showTermsView) {
    app.innerHTML = renderTerms(true);
    return;
  }
  // 既存ユーザーがアップデートした直後は「更新しました」画面を出す
  if (updateInfo) {
    app.innerHTML = renderUpdateScreen();
    return;
  }
  if (!state.initialized) {
    app.innerHTML = renderSetup();
    bindSetup();
    return;
  }
  app.innerHTML = renderApp();
  bindApp();
  switchTab(currentTab);
}

// ── UPDATE NOTICE ────────────────────────────────────────────────────────────
// 前回開いたときのバージョンと比べて、更新されていれば updateInfo をセット
function checkVersion() {
  let prev = null;
  try { prev = localStorage.getItem(VERSION_KEY); } catch {}
  if (prev && prev !== APP_VERSION) {
    // バージョンが変わった既存ユーザー
    updateInfo = { from: prev, to: APP_VERSION };
  } else if (!prev && state.initialized) {
    // バージョン記録が無いが、すでにデータがある人
    // （今回からバージョン管理を始めたため、初回だけ案内を出す）
    updateInfo = { from: null, to: APP_VERSION };
  }
  try { localStorage.setItem(VERSION_KEY, APP_VERSION); } catch {}
}

function bindSetup() {
  if (setupStep===1) {
    const inp = document.getElementById('setup-sysname');
    inp?.addEventListener('input', e => {
      setupData.systemName = e.target.value;
      document.getElementById('setup-next').disabled = !e.target.value.trim();
    });
    inp?.addEventListener('keydown', e => { if (e.key==='Enter' && setupData.systemName.trim()) setupNext(); });
    document.getElementById('setup-next')?.addEventListener('click', setupNext);
  } else {
    document.getElementById('setup-altername')?.addEventListener('input', e => {
      setupData.alterName = e.target.value;
      updateSetupComplete();
    });
    document.getElementById('setup-alterhandle')?.addEventListener('input', e => {
      setupData.alterHandle = e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,'');
      e.target.value = setupData.alterHandle;
      updateSetupComplete();
    });
    document.getElementById('setup-alterrole')?.addEventListener('input', e => { setupData.alterRole = e.target.value; });
    document.getElementById('setup-complete')?.addEventListener('click', completeSetup);
  }
}

function updateSetupComplete() {
  const btn = document.getElementById('setup-complete');
  if (btn) btn.disabled = !setupData.alterName.trim() || !setupData.alterHandle.trim();
}

function setupNext() {
  if (!setupData.systemName.trim()) return;
  setupStep = 2;
  render();
}

function setupBack() {
  setupStep = 1;
  render();
}

function selectSetupColor(c) {
  setupData.alterColor = c;
  document.querySelectorAll('#setup-color-row .color-dot').forEach(d => {
    d.classList.toggle('selected', d.dataset.color === c);
  });
}

function completeSetup() {
  if (!setupData.alterName.trim() || !setupData.alterHandle.trim()) return;
  state.systemName = setupData.systemName.trim();
  state.alters = [{
    id: randomId(), name: setupData.alterName.trim(),
    handle: setupData.alterHandle.trim(), color: setupData.alterColor,
    role: setupData.alterRole.trim(), createdAt: new Date().toISOString()
  }];
  state.posts = [];
  state.initialized = true;
  saveState();
  render();
}

function bindApp() {
  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
  bindTimeline();
  bindAlters();
  bindSettings();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id===`tab-${tab}`));
  // 投稿後に切り替えても最新の内容を見せるため、その都度作り直す
  if (tab==='calendar') refreshCalendar();
  if (tab==='stats') { const s=document.getElementById('tab-stats'); if (s) s.innerHTML = renderStats(); }
}

// ── TIMELINE ─────────────────────────────────────────────────────────────────
function filteredPosts() {
  const q = searchQuery.trim().toLowerCase();
  return [...state.posts]
    .filter(p => filterAlterId==='all' || p.alterId===filterAlterId)
    .filter(p => filterMood==='all' || p.mood===filterMood)
    .filter(p => !filterMention || mentionsActive(p))
    .filter(p => !q || postMatchesQuery(p, q))
    .sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
}

// 検索：本文・人格名・ハンドルにヒット
function postMatchesQuery(p, q) {
  if (String(p.content||'').toLowerCase().includes(q)) return true;
  const a = state.alters.find(x=>x.id===p.alterId);
  if (a && ((a.name||'').toLowerCase().includes(q) || (a.handle||'').toLowerCase().includes(q))) return true;
  return false;
}

function renderPostsList() {
  const filtered = filteredPosts();
  const q = searchQuery.trim();
  if (filtered.length === 0) {
    const msg = state.posts.length===0 ? '最初の投稿をしてみよう。'
      : q ? `「${escHtml(q)}」に一致する投稿はありません。` : '該当する投稿はありません。';
    return `<div class="empty">${msg}</div>`;
  }
  const countLine = q ? `<div class="search-count">${filtered.length} 件見つかりました</div>` : '';
  return countLine + filtered.map(p=>renderPost(p)).join('');
}

function renderPost(post, opts={}) {
  const readOnly = !!opts.readOnly;
  const alter = state.alters.find(a=>a.id===post.alterId);
  if (!alter) return '';
  const mood = MOODS.find(m=>m.value===post.mood);
  const isEditing = !readOnly && editingPostId===post.id;
  const showFull = expandedDateId===post.id;
  const isAnnounce = hasAllMention(post.content);
  return `
    <div class="card accent" style="border-left-color:${alter.color}" id="post-${post.id}">
      <div class="post-header">
        ${avatarHTML(alter,34)}
        <div class="post-meta">
          <div class="post-meta-row">
            <span class="alter-name">${escHtml(alter.name)}</span>
            <span class="alter-handle">@${escHtml(alter.handle)}</span>
          </div>
        </div>
        ${readOnly
          ? `<span class="post-time">${formatDate(post.timestamp)}</span>`
          : `<span class="post-time" onclick="toggleDate('${post.id}')">${showFull?formatDate(post.timestamp):timeAgo(post.timestamp)}</span>`}
      </div>
      ${isEditing ? `
        <div class="edit-area">
          <textarea class="edit-textarea" id="edit-${post.id}">${escHtml(post.content)}</textarea>
          <div class="edit-btns">
            <button class="edit-save" onclick="saveEdit('${post.id}')">保存</button>
            <button class="edit-cancel" onclick="cancelEdit()">キャンセル</button>
          </div>
        </div>` : `
        <p class="post-body">${renderContentWithMentions(post.content)}</p>`}
      <div class="post-footer">
        ${isAnnounce?`<span class="announce-badge">📢 周知</span>`:''}
        <span class="mood-badge">${mood?mood.emoji+' '+mood.label:''}</span>
        ${!isEditing && !readOnly?`
        <div class="post-actions">

// ── Mentions ─────────────────────────────────────────────────────────────────
// 投稿文に「@全体」など全体メンションが含まれているか
function hasAllMention(content) {
  const words = ALL_MENTION_WORDS.map(w => '@'+w).join('|');
  return new RegExp('(?:^|[^A-Za-z0-9_])(?:'+words+')').test(String(content||''));
}
// いま選んでいる人格に宛てられた投稿か（@自分のハンドル または 全体メンション）
function mentionsActive(post) {
  if (hasAllMention(post.content)) return true;
  const me = state.alters.find(a=>a.id===activeAlterId());
  if (!me) return false;
  return new RegExp('@'+me.handle+'(?![a-z0-9_])').test(String(post.content||''));
}
// 投稿文をエスケープしつつ、メンション部分に色をつける
function renderContentWithMentions(content) {
  let html = escHtml(content);
  // 既存の人格ハンドルへのメンション
  html = html.replace(/@([a-z0-9_]+)/g, (m, h) => {
    const a = state.alters.find(x=>x.handle===h);
    if (!a) return m;
    return `<span class="mention" style="color:${a.color};background:${a.color}18">@${h}</span>`;
  });
  // 全体メンション（@全体 / @みんな / @ぜんいん）
  const allWords = ALL_MENTION_WORDS.join('|');
  html = html.replace(new RegExp('@('+allWords+')', 'g'), '<span class="mention mention-all">@$1</span>');
  return html;
}
// メンションのトークンを入力欄に差し込む
function insertMention(token) {
  const ta = document.getElementById('compose-text');
  if (!ta) return;
  const cur = ta.value;
  const needsSpace = cur && !/\s$/.test(cur);
  ta.value = cur + (needsSpace ? ' ' : '') + token + ' ';
  ta.focus();
  const btn = document.getElementById('post-btn');
  if (btn) btn.disabled = !ta.value.trim();
}

function submitPost() {
  const ta = document.getElementById('compose-text');
  const mood = document.getElementById('compose-mood');
  if (!ta?.value.trim()) return;
  state.posts.unshift({
    id: randomId(), alterId: activeAlterId(),

// ── CALENDAR ─────────────────────────────────────────────────────────────────
function dateKey(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}-${dt.getMonth()+1}-${dt.getDate()}`;
}

// その月の各日ごとの投稿をまとめる： key → [posts]
function postsByDayInMonth(year, month) {
  const map = {};
  state.posts.forEach(p => {
    const dt = new Date(p.timestamp);
    if (dt.getFullYear()===year && dt.getMonth()===month) {
      const k = dateKey(dt);
      (map[k] = map[k] || []).push(p);
    }
  });
  return map;
}

function renderCalendar() {
  const DOW = ['日','月','火','水','木','金','土'];
  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const byDay = postsByDayInMonth(calYear, calMonth);
  const todayKey = dateKey(new Date());

  let cells = '';
  for (let i=0; i<startDow; i++) cells += `<div class="cal-cell empty"></div>`;
  for (let day=1; day<=daysInMonth; day++) {
    const k = `${calYear}-${calMonth+1}-${day}`;
    const posts = byDay[k] || [];
    const classes = ['cal-cell'];
    if (posts.length) classes.push('has-posts');
    if (k===todayKey) classes.push('today');
    if (k===calSelectedKey) classes.push('selected');
    // 投稿した人格の色のドット（最大3つ＋それ以上は +N）
    const colors = [...new Set(posts.map(p=>{
      const a = state.alters.find(x=>x.id===p.alterId); return a?a.color:'#bbb';
    }))];
    const dots = colors.slice(0,3).map(c=>`<span class="cal-dot" style="background:${c}"></span>`).join('');
    const more = colors.length>3 ? `<span class="cal-more">+${colors.length-3}</span>` : '';
    cells += `
      <div class="${classes.join(' ')}" onclick="selectCalDay('${k}')">
        <span class="cal-daynum">${day}</span>
        ${posts.length?`<div class="cal-dots">${dots}${more}</div>`:''}
      </div>`;
  }

  return `
    <div class="cal-head">
      <button class="cal-nav" onclick="calPrevMonth()">◀</button>
      <div class="cal-title">${calYear}年 ${calMonth+1}月</div>
      <button class="cal-nav" onclick="calNextMonth()">▶</button>
    </div>
    <div class="cal-grid">
      ${DOW.map((d,i)=>`<div class="cal-dow ${i===0?'sun':''}${i===6?'sat':''}">${d}</div>`).join('')}
      ${cells}
    </div>
    <div id="cal-day-posts">${renderCalDayPosts()}</div>`;
}

function renderCalDayPosts() {
  if (!calSelectedKey) {
    return `<div class="empty" style="padding:28px 0">日付をタップすると、その日の投稿が見られます。</div>`;
  }
  const [y,m,d] = calSelectedKey.split('-').map(Number);
  const dayPosts = state.posts
    .filter(p => { const dt=new Date(p.timestamp); return dt.getFullYear()===y && dt.getMonth()===m-1 && dt.getDate()===d; })
    .sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  const head = `<div class="cal-selected-head">${y}年${m}月${d}日（${dayPosts.length}件）</div>`;
  if (dayPosts.length===0) return head + `<div class="empty" style="padding:20px 0">この日の投稿はありません。</div>`;
  return head + dayPosts.map(p=>renderPost(p, {readOnly:true})).join('');
}

function refreshCalendar() {
  const panel = document.getElementById('tab-calendar');
  if (panel) panel.innerHTML = renderCalendar();
}

function selectCalDay(key) {
  calSelectedKey = (calSelectedKey===key) ? null : key;
  refreshCalendar();
}

function calPrevMonth() {
  calMonth--; if (calMonth<0) { calMonth=11; calYear--; }
  calSelectedKey = null;
  refreshCalendar();
}

function calNextMonth() {
  calMonth++; if (calMonth>11) { calMonth=0; calYear++; }
  calSelectedKey = null;
  refreshCalendar();
}

  alterFormData = {name:a.name, handle:a.handle, color:a.color, role:a.role||''};

  refreshAlters();

function saveAlter() {
  if (!alterFormData.name.trim() || !alterFormData.handle.trim()) return;
  if (editingAlterId) {
    state.alters = state.alters.map(a=>a.id===editingAlterId?{...a,...alterFormData,name:alterFormData.name.trim(),handle:alterFormData.handle.trim(),role:alterFormData.role.trim()}:a);

  } else {
    state.alters.push({ id:randomId(), name:alterFormData.name.trim(), handle:alterFormData.handle.trim(), color:alterFormData.color, role:alterFormData.role.trim(), createdAt:new Date().toISOString() });

  showAlterForm = false;
  alterFormData = {name:'',handle:'',color:PALETTE[0],role:''};
  saveState();
  refreshAlters();
  showToast('保存しました');
}

  state.alters = state.alters.filter(x=>x.id!==id);
  saveState();
  refreshAlters();
}

function copyAddress(text) {
  const done = () => showToast('アドレスをコピーしました');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    done();
  } catch {
    showToast('コピーできませんでした');
  }
}

function saveSystemName() {
  const inp = document.getElementById('settings-sysname');
  if (!inp?.value.trim()) return;
  state.systemName = inp.value.trim();
  saveState();
  document.querySelector('.nav-title').textContent = state.systemName;
  showToast('システム名を保存しました');
}

function resetApp() {
  if (!confirm('すべてのデータを削除してリセットしますか？この操作は取り消せません。')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = { initialized:false, systemName:'', alters:[], posts:[], agreedTermsVersion:0 };
  setupStep = 1;
  setupData = {systemName:'',alterName:'',alterHandle:'',alterColor:PALETTE[0],alterRole:''};
  showTermsView = false;
  filterMention = false;
  render();
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ─────────────────────────────────────────────────────────────────────
loadState();
checkVersion();
render();

// ── Service Worker（自動アップデート対応） ───────────────────────────────────
if ('serviceWorker' in navigator) {
  // すでにSWに管理されている＝以前から使っている人。新SWに切り替わったら一度だけ再読み込み
  const hadController = !!navigator.serviceWorker.controller;
  let reloading = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!hadController || reloading) return; // 初回インストール時はリロードしない
    reloading = true;
    window.location.reload();
  });

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then((reg) => {
      // 定期的に更新チェック
      reg.update().catch(() => {});
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          // 新バージョンの準備ができたら待たせずに切り替え（→ controllerchange でリロード）
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            nw.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    }).catch(() => {});
  });
}
</script>
